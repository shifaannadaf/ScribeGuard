services:
  db:
    image: postgres:16-alpine
    container_name: scribeguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scribeguard
      POSTGRES_PASSWORD: scribeguard
      POSTGRES_DB: scribeguard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
